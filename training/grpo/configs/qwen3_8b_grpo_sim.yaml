# veRL 0.7.1 GRPO config for Qwen3-8B response-similarity reward training.

defaults:
  - qwen3_8b_grpo
  - _self_

actor_rollout_ref:
  actor:
    use_kl_loss: true
    kl_loss_coef: 0.001
    optim:
      lr: 1.0e-5

critic:
  optim:
    lr: 1.0e-5

reward:
  num_workers: 1
  reward_manager:
    source: importlib
    name: GroupedSimRewardManager
    module:
      path: training/grpo/sim_reward_manager.py

reward_model:
  reward_kwargs:
    n_rollouts: 4
    judge_model: qwen/qwen3.5-397b-a17b

trainer:
  default_local_dir: results/grpo/checkpoints_sim
  experiment_name: qwen3-8b-grpo-sim
