# veRL 0.7.1 GRPO config for Qwen3-8B logprob training.

defaults:
  - qwen3_8b_grpo
  - _self_

actor_rollout_ref:
  actor:
    loss_agg_mode: token-mean
    loss_scale_factor: 1024
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    use_kl_loss: false
    kl_loss_coef: 0.001
    optim:
      lr: 1.0e-5

critic:
  optim:
    lr: 1.0e-5

algorithm:
  norm_adv_by_std_in_grpo: false

trainer:
  default_local_dir: results/grpo/checkpoints_logprob
  experiment_name: qwen3-8b-grpo-logprob
